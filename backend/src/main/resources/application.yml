server:
  port: 8081

spring:
  application:
    name: feftms

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:falcon_energy_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Secrets and Expirations
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:407f349c235728a5cf570f7cf49d5930b80b2a7c88b90a6f8b9e6f8c7b8d9e6f}
      expiration: 3600000 # 1 hour in ms
      refresh-token:
        expiration: 604800000 # 7 days in ms

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
